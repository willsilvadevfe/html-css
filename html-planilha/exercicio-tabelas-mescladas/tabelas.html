<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Exercicios tabelas mescladas</title>
</head>
<body>
    <h1>Exercicio tabelas mescladas curso HTML5 e CSS3</h1>
    <h2>Aplicado por Gustavo Guanabara (Exercicio-001)</h2>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr>
            <td colspan="3">8</td>
            <td>9</td>
        </tr>
        <tr>
            <td rowspan="3">10</td>
            <td colspan="2">11</td>
            <td>12</td>
        </tr>
        <tr></tr>
            <td class="bordernone">13</td>
            <td class="bordernone">14</td>
            <td>15</td>   
    </tr>
    </table>
    
</body>
</html>
